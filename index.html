<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Keith Nelson</title>
<link rel="icon" href="/favicon.ico?v=1" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=1">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png?v=1">
<link rel="apple-touch-icon" href="/favicon-180.png?v=1">
<link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400..700;1,400..700&family=Lato:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1B6B4A;
    --green-deep: #14523A;
    --green-tint: #EDF4F0;
    --green-line: #BFD8CC;
    --ink: #2B2F2D;
    --grey: #6A736E;
    --sage: #39463F;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Lato", sans-serif; color: var(--ink); background: var(--sage);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .card {
    background: #fff; width: 100%; max-width: 560px; border-radius: 14px;
    box-shadow: 0 18px 60px rgba(0,0,0,0.4); overflow: hidden;
  }
  .accent { height: 6px; background: var(--green); }
  .body { padding: 52px 48px 44px; text-align: center; }

  h1 {
    font-family: "Lora", serif; font-weight: 700; font-size: 40px;
    letter-spacing: 0.5px; color: var(--ink); line-height: 1.05;
  }
  h1 .last { color: var(--green); }

  .title {
    font-family: "Lora", serif; font-style: italic; font-size: 16px;
    color: var(--green-deep); margin-top: 12px; line-height: 1.45;
  }

  .rule { width: 46px; height: 2px; background: var(--green-line); margin: 26px auto; border: none; }

  .contact { display: flex; flex-direction: column; gap: 12px; align-items: center; }
  .contact .row { font-size: 14.5px; color: var(--ink); }
  .contact .row .ic { color: var(--green); font-weight: 700; margin-right: 8px; }
  .contact a { color: var(--ink); text-decoration: none; border-bottom: 1px solid var(--green-line); padding-bottom: 1px; }
  .contact a:hover { color: var(--green); border-color: var(--green); }
  .loc { color: var(--grey); }

  .cta {
    display: inline-block; margin-top: 30px; background: var(--green); color: #fff;
    font-weight: 700; font-size: 14.5px; letter-spacing: 0.3px; text-decoration: none;
    padding: 12px 26px; border-radius: 8px; transition: background 0.15s ease;
  }
  .cta:hover { background: var(--green-deep); }

  @media (max-width: 480px) {
    .body { padding: 40px 28px 34px; }
    h1 { font-size: 32px; }
    .title { font-size: 14.5px; }
  }
</style>
</head>
<body>
  <main class="card">
    <div class="accent"></div>
    <div class="body">
      <h1>KEITH <span class="last">NELSON</span></h1>
      <div class="title">Climate &amp; Energy Transition Consulting · Business Transformation</div>
      <hr class="rule">
      <div class="contact">
        <div class="row loc"><span class="ic">◆</span>Barcelona, Spain</div>
        <div class="row"><span class="ic">✉</span><a href="mailto:keith@newdayclimate.com">keith@newdayclimate.com</a></div>
        <div class="row"><span class="ic">☎</span><a href="tel:+34632589257">+34 632 589 257</a></div>
        <div class="row"><span class="ic">in</span><a href="https://www.linkedin.com/in/keith-nelson-climate-strategy" target="_blank" rel="noopener">linkedin.com/in/keith-nelson-climate-strategy</a></div>
      </div>
      <a class="cta" href="mailto:keith@newdayclimate.com">Get in touch</a>
    </div>
  </main>
</body>
</html>
